<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 275px;
      padding: 10px;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 8px;
      color: #000;
    }
    h1 a {
      color: inherit;
      text-decoration: none;
    }
    h1 a:hover {
      text-decoration: underline;
    }
    #chapters {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .chapter-item {
      background-color: white;
      padding: 6px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }
    .chapter-item.recent {
      border-left: 4px solid #d32f2f;
    }
    .chapter-item.old {
      border-left: 4px solid #009dff;
    }
    .chapter-title {
      color: #000;
      font-size: 14px;
      font-weight: bold;
      margin: 0;
    }
    .chapter-subtitle {
      color: #555;
      font-size: 12px;
      margin-top: 4px;
    }
    .chapter-item:hover {
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.2);
      transform: translateY(-1px);
    }
    .chapter-number {
      font-weight: bold;
      color: #4CAF50;
      font-size: 14px;
    }
    .chapter-title {
      color: #000;
      font-size: 13px;
      margin-top: 4px;
    }
    .chapter-date {
      color: #999;
      font-size: 11px;
      margin-top: 4px;
    }
    .new-badge {
      display: inline-block;
      background-color: #d32f2f;
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      margin-left: 6px;
      font-weight: bold;
    }
    .break-text {
      float: right;
      color: #999;
      font-size: 11px;
      font-style: italic;
    }
    #loading {
      text-align: center;
      color: #666;
      padding: 16px;
    }
    #error {
      background-color: #ffebee;
      color: #d32f2f;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: none;
    }
    #websiteBtn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    #websiteBtn:hover {
      background-color: #555;
      transform: translateY(-1px);
    }
    #websiteBtn {
      transition: transform 0.2s, background-color 0.2s;
    }
    /*
    #clearCacheBtn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background-color: #666;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: normal;
    }
    #clearCacheBtn:hover {
      background-color: #888;
    }
    */
  </style>
</head>
<body>
  <h1><a id="mainTitleLink" href="https://www.reddit.com/r/OnePiece/?f=flair_name%3A%22Current%20Chapter%22" target="_blank" rel="noopener noreferrer">Latest One Piece Chapters</a></h1>
  <div id="error"></div>
  <div id="loading">Loading chapters...</div>
  <ul id="chapters" style="display: none;"></ul>
  <button id="websiteBtn">Visit TCB Scans</button>
  <!-- <button id="clearCacheBtn">Clear Cache & Reload</button> -->
  <script src="popup.js"></script>
</body>
</html>
